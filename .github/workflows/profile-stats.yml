name: Generate profile stats images

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download stats card
        run: |
          mkdir -p assets
          curl -L "https://api.github-readme-stats.vercel.app/api?username=Danalytiks&show_icons=true"

      - name: Download top languages card
        run: |
          curl -L "https://github-readme-stats.vercel.app/api/top-langs/?username=Danalytiks&layout=compact" -o assets/top-langs.svg

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.svg assets/top-langs.svg
          git commit -m "Update profile stats images" || exit 0
          git push
