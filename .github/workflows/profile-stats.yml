name: Generate profile stats images

on:
  schedule:
    - cron: "0 6 * * *"   # every day 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GitHub stats card (PNG)
        run: |
          mkdir -p assets
          curl -L --retry 5 --retry-delay 2 --fail \
            "https://github-readme-stats.vercel.app/api?username=Danalytiks&show_icons=true&format=png" \
            -o assets/github-stats.png
          ls -la assets
          file assets/github-stats.png

      - name: Download top languages card (PNG)
        run: |
          curl -L --retry 5 --retry-delay 2 --fail \
            "https://github-readme-stats.vercel.app/api/top-langs/?username=Danalytiks&layout=compact&format=png" \
            -o assets/top-langs.png
          ls -la assets
          file assets/top-langs.png

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/github-stats.png assets/top-langs.png
          git commit -m "Update profile stats images" || exit 0
          git push
